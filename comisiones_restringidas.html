<!DOCTYPE html>
<html class="dark" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Comisiones Restringidas - Segumex</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="finanzas.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        // --- SCRIPT DE SEGURIDAD MODIFICADO PARA ADMIN ---
        (async function () {
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
            } else {
                // Verificar Rol Admin
                const sesionLocal = JSON.parse(localStorage.getItem('segumex_sesion')) || {};
                if (sesionLocal.rol !== 'admin') {
                    window.location.href = 'index.html'; // Redirigir agentes fuera de aquí
                }
            }
        })();

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { "primary": "#ef4444", "background-dark": "#0f111a", "surface-dark": "#161b22", "surface-card": "#1f242e", "text-secondary": "#94a3b8" } // Primary red for restricted
                },
            },
        }
    </script>
</head>

<body class="bg-background-dark font-display text-white overflow-hidden relative" onload="cargarComisiones()">
    <!-- Overlay Mobile -->
    <div id="sidebarOverlay" onclick="toggleMenu()"
        class="fixed inset-0 bg-black/50 z-40 hidden md:hidden glass transition-opacity"></div>

    <div class="flex h-screen w-full overflow-hidden">
        <aside id="sidebar"
            class="fixed inset-y-0 left-0 z-50 w-64 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col border-r border-[#2d3442] bg-[#161b22] flex-shrink-0 shadow-2xl md:shadow-none">
        </aside>
        <main class="flex-1 flex flex-col h-full relative w-full">
            <!-- Mobile Header / Toggle -->
            <div class="md:hidden p-4 pb-0 flex items-center gap-3 bg-[#161b22]">
                <button onclick="toggleMenu()" class="p-2 -ml-2 text-white hover:bg-white/10 rounded-lg">
                    <span class="material-symbols-outlined text-2xl">menu</span>
                </button>
                <span class="font-bold text-lg">Segumex</span>
            </div>
            <header
                class="h-auto md:h-16 py-4 md:py-0 border-b border-[#2d3442] bg-[#161b22] flex flex-col md:flex-row items-center justify-between px-6 shrink-0 gap-4">
                <h1 class="text-xl font-bold text-white flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary">lock_person</span> Comisiones Restringidas
                </h1>
                <div class="flex items-center gap-3">
                    <button id="btnExportarExcel" onclick="exportarExcel()"
                        class="flex items-center gap-2 px-4 py-2 rounded-lg bg-green-500/15 border border-green-500/30 text-green-400 hover:bg-green-500 hover:text-white transition-all text-sm font-bold shadow-lg shadow-green-500/10">
                        <span class="material-symbols-outlined text-[18px]">download</span>
                        Exportar Excel
                    </button>
                    <span
                        class="text-xs text-primary font-bold border border-primary/30 bg-primary/10 px-2 py-1 rounded">SOLO
                        ADMINISTRADOR</span>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-6 custom-scroll">
                <div class="max-w-[1600px] mx-auto h-full flex flex-col gap-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 shrink-0">
                        <div
                            class="bg-surface-card border border-[#2d3442] rounded-xl p-5 relative overflow-hidden group">
                            <p class="text-[#94a3b8] text-xs font-bold mb-1">Ganadas (Privadas)</p>
                            <h2 class="text-3xl font-bold text-white" id="kpiGanadas">$0.00</h2>
                        </div>
                        <div
                            class="bg-surface-card border border-[#2d3442] rounded-xl p-5 relative overflow-hidden group border-l-4 border-l-green-500">
                            <p class="text-[#94a3b8] text-xs font-bold mb-1">Cobradas (Privadas)</p>
                            <h2 class="text-3xl font-bold text-green-400" id="kpiCobradas">$0.00</h2>
                        </div>
                    </div>

                    <div class="flex border-b border-[#2d3442]">
                        <button id="tabPendientes" onclick="cambiarTab('pendientes')"
                            class="px-6 py-3 text-sm font-bold border-b-2 border-primary text-primary">Por
                            Conciliar</button>
                        <button id="tabFinalizadas" onclick="cambiarTab('finalizadas')"
                            class="px-6 py-3 text-sm font-medium text-[#94a3b8]">Historial Cobrado</button>
                    </div>

                    <div
                        class="flex-1 bg-surface-card border border-[#2d3442] rounded-xl flex flex-col overflow-hidden">
                        <div
                            class="grid grid-cols-12 gap-4 px-6 py-3 bg-[#161b22] border-b border-[#2d3442] text-[10px] uppercase font-bold text-[#94a3b8]">
                            <div class="col-span-3">Cliente / Póliza</div>
                            <div class="col-span-2">No. Pago</div>
                            <div class="col-span-2">Fecha Cliente</div>
                            <div class="col-span-2 text-right">Comisión</div>
                            <div class="col-span-3 text-center">Acción</div>
                        </div>
                        <div class="flex-1 overflow-y-auto custom-scroll p-2 space-y-1" id="listaComisiones"></div>
                        <div class="p-4 border-t border-[#2d3442] bg-[#1a202a] text-right text-lg font-black text-white"
                            id="totalComisionVista">$0.00</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="menu.js"></script>
    <script>
        let vistaActual = 'pendientes';

        async function cargarComisiones() {
            // --- CONSULTA SUPABASE ---
            const { data: db } = await window.supabaseClient.from('polizas').select('*');
            const { data: clis } = await window.supabaseClient.from('clientes').select('id, nombre');

            const cont = document.getElementById('listaComisiones'); cont.innerHTML = '';
            let tG = 0, tC = 0, tV = 0;

            const sesion = JSON.parse(localStorage.getItem('segumex_sesion')) || {};

            (db || []).forEach(p => {
                // FILTRO DE RESTRICCIÓN:
                // Solo mostrar si restringida es VERDADERO.
                if (p.restringida !== true) return;

                if (!p.pagos_status) return;
                const cli = (clis || []).find(c => String(c.id) === String(p.cliente_id));
                const num = parseInt(p.finanzas?.formaPago) || 1;
                const monto = window.SegumexFinanzas.calcularComision(
                    p.finanzas?.primaNeta,
                    num,
                    p.finanzas?.comisionPct
                );

                p.pagos_status.forEach((pagado, idx) => {
                    if (pagado === true) {
                        const cobrada = p.comisiones_cobradas_status && p.comisiones_cobradas_status[idx] === true;
                        if (cobrada) {
                            tC += monto;
                            if (vistaActual === 'finalizadas') { renderFila(p, cli, idx, monto, true); tV += monto; }
                        } else {
                            tG += monto;
                            if (vistaActual === 'pendientes') { renderFila(p, cli, idx, monto, false); tV += monto; }
                        }
                    }
                });
            });
            document.getElementById('kpiGanadas').innerText = formatoMoneda(tG);
            document.getElementById('kpiCobradas').innerText = formatoMoneda(tC);
            document.getElementById('totalComisionVista').innerText = "Total vista: " + formatoMoneda(tV);
        }

        function renderFila(p, c, idx, m, esC) {
            document.getElementById('listaComisiones').innerHTML += `
            <div class="grid grid-cols-2 md:grid-cols-12 gap-2 md:gap-4 px-4 py-3 hover:bg-[#1a202a] border-b border-[#2d3442]/50 items-center rounded-lg mx-2">
                <div class="col-span-2 md:col-span-3 text-sm text-white font-bold md:font-normal">${c ? c.nombre : 'Desc.'}</div>
                <div class="col-span-1 md:col-span-2 text-xs text-[#94a3b8]">Pago ${idx + 1} <span class="md:hidden">• ${p.pagos_fechas ? p.pagos_fechas[idx] : '--'}</span></div>
                <div class="hidden md:block md:col-span-2 text-xs text-[#94a3b8]">${p.pagos_fechas ? p.pagos_fechas[idx] : '---'}</div>
                <div class="col-span-1 md:col-span-2 text-right font-bold ${esC ? 'text-green-400' : 'text-blue-400'}">${formatoMoneda(m)}</div>
                <div class="col-span-2 md:col-span-3 text-center md:text-center mt-2 md:mt-0">
                    ${!esC ? `<button onclick="marcarComisionCobrada('${p.id}', ${idx})" class="w-full md:w-auto px-4 py-2 md:py-1 bg-green-500/20 text-green-400 rounded-lg text-xs font-bold hover:bg-green-500 hover:text-white transition-all">Conciliar</button>` : `<span class="text-green-500 text-xs font-bold flex items-center justify-center gap-1"><span class="material-symbols-outlined text-sm">check_circle</span> Verificado</span>`}
                </div>
            </div>`;
        }

        async function marcarComisionCobrada(polizaId, indexPago) {
            if (confirm("¿Confirmas que ya recibiste esta comisión RESTRINGIDA?")) {
                const { data: p } = await window.supabaseClient.from('polizas').select('*').eq('id', polizaId).single();

                if (p) {
                    const totalCuotas = parseInt(p.finanzas?.formaPago) || 12;
                    let nuevosCobradasStatus = p.comisiones_cobradas_status || new Array(totalCuotas).fill(false);
                    nuevosCobradasStatus[indexPago] = true;

                    await window.supabaseClient.from('polizas').update({
                        comisiones_cobradas_status: nuevosCobradasStatus
                    }).eq('id', polizaId);

                    await cargarComisiones();
                }
            }
        }

        function cambiarTab(t) { vistaActual = t; cargarComisiones(); }
        function formatoMoneda(v) { return window.SegumexFinanzas.formatoMoneda(v); }

        const MESES_CORTO_R = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

        // ============================================================
        // Exportar a Excel Profesional (Restringidas)
        // ============================================================
        async function exportarExcel() {
            const btn = document.getElementById('btnExportarExcel');
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined text-[18px] animate-spin">sync</span> Generando...';

            try {
                const [{ data: polizasDB }, { data: clis }] = await Promise.all([
                    window.supabaseClient.from('polizas').select('*'),
                    window.supabaseClient.from('clientes').select('id, nombre')
                ]);

                let tG = 0, tC = 0;
                const filasP = [], filasC = [];

                (polizasDB || []).forEach(p => {
                    if (p.restringida !== true || !p.pagos_status) return;
                    const cli = (clis || []).find(c => String(c.id) === String(p.cliente_id));
                    const num = parseInt(p.finanzas?.formaPago) || 1;
                    const monto = window.SegumexFinanzas.calcularComision(p.finanzas?.primaNeta, num, p.finanzas?.comisionPct);
                    const pagosDetalle = p.finanzas?.pagos_detalle || [];

                    p.pagos_status.forEach((pagado, idx) => {
                        if (pagado !== true) return;
                        let montoReal = monto;
                        if (pagosDetalle[idx]?.comision !== undefined) montoReal = parseFloat(pagosDetalle[idx].comision);

                        const cobrada   = p.comisiones_cobradas_status?.[idx] === true;
                        const noPoliza  = p.no_poliza || p.numero || '---';
                        const nombreCli = cli ? cli.nombre : 'Desc.';
                        const fechaPago = p.pagos_fechas?.[idx] || '';
                        const fechaLim  = pagosDetalle[idx]?.fecha || '';

                        const fila = { nombreCli, noPoliza, idx, fechaLim, fechaPago, montoReal };
                        if (cobrada) { tC += montoReal; filasC.push(fila); }
                        else         { tG += montoReal; filasP.push(fila); }
                    });
                });

                // Estilos
                const cellBase = { font: { sz: 10, color: { rgb: 'E2E8F0' } }, alignment: { vertical: 'center' } };
                const rowAlt   = { fill: { fgColor: { rgb: '1C1F27' } } };
                const rowNorm  = { fill: { fgColor: { rgb: '111318' } } };
                const moneyFmt = '"$"#,##0.00';
                const hdrBase  = { font: { bold: true, color: { rgb: 'FFFFFF' }, sz: 11 }, alignment: { horizontal: 'center', vertical: 'center', wrapText: true }, border: { bottom: { style: 'thin', color: { rgb: '3B4354' } } } };
                const hdrRed   = { ...hdrBase, fill: { fgColor: { rgb: '991B1B' } } };
                const hdrGreen = { ...hdrBase, fill: { fgColor: { rgb: '166534' } } };
                const hdrBlue  = { ...hdrBase, fill: { fgColor: { rgb: '1E40AF' } } };

                function mc(v, extra) { return { v: v ?? '', s: { ...cellBase, ...extra } }; }
                function fmtF(str) {
                    if (!str) return '—';
                    const [y, m, d] = str.split('-');
                    return `${parseInt(d)} ${MESES_CORTO_R[parseInt(m)-1]} ${y}`;
                }

                function buildSheet(filas, hdrStyle) {
                    const headers = ['#', 'Cliente', 'No. Póliza', 'No. Pago', 'Fecha Límite', 'Fecha Pago', 'Comisión'];
                    const headerRow = headers.map(h => ({ v: h, s: hdrStyle }));
                    const dataRows = filas.map((f, i) => {
                        const bg = i % 2 === 0 ? rowAlt.fill : rowNorm.fill;
                        const s = { fill: bg };
                        return [
                            mc(i + 1, s),
                            mc(f.nombreCli, s),
                            mc(f.noPoliza, { ...s, font: { ...cellBase.font, name: 'Consolas' } }),
                            mc(`Pago ${f.idx + 1}`, s),
                            mc(fmtF(f.fechaLim), s),
                            mc(fmtF(f.fechaPago), s),
                            mc(f.montoReal, { fill: bg, numFmt: moneyFmt, font: { bold: true, sz: 10, color: { rgb: '60A5FA' } } }),
                        ];
                    });
                    const totalBg = { fill: { fgColor: { rgb: '0F111A' } } };
                    const totalRow = headers.map(() => mc('', totalBg));
                    totalRow[1] = mc(`${filas.length} registros`, { ...totalBg, font: { bold: true, sz: 10, color: { rgb: '94A3B8' } } });
                    totalRow[6] = mc(filas.reduce((s, f) => s + f.montoReal, 0), { ...totalBg, numFmt: moneyFmt, font: { bold: true, sz: 12, color: { rgb: 'FFFFFF' } } });

                    const ws = XLSX.utils.aoa_to_sheet([headerRow, ...dataRows, totalRow]);
                    ws['!cols'] = [{ wch: 5 }, { wch: 28 }, { wch: 18 }, { wch: 10 }, { wch: 16 }, { wch: 16 }, { wch: 16 }];
                    ws['!rows'] = [{ hpt: 26 }];
                    return ws;
                }

                const WB = XLSX.utils.book_new();

                // Resumen
                const fechaHoy = new Date().toLocaleDateString('es-MX', { day: '2-digit', month: 'long', year: 'numeric' });
                const wsRes = XLSX.utils.aoa_to_sheet([
                    [{ v: 'SEGUMEX — COMISIONES RESTRINGIDAS', s: { font: { bold: true, sz: 18, color: { rgb: 'FFFFFF' } }, fill: { fgColor: { rgb: '991B1B' } }, alignment: { horizontal: 'center' } } }],
                    [{ v: `Generado: ${fechaHoy} • CONFIDENCIAL`, s: { font: { sz: 11, color: { rgb: 'FCA5A5' } }, fill: { fgColor: { rgb: '111318' } } } }],
                    [],
                    [{ v: 'INDICADOR', s: hdrRed }, { v: 'MONTO', s: hdrRed }, { v: 'REGISTROS', s: hdrRed }],
                    [mc('Comisiones Ganadas (Privadas)', rowAlt), mc(tG, { ...rowAlt, numFmt: moneyFmt, font: { bold: true, sz: 14, color: { rgb: '60A5FA' } } }), mc(filasP.length, rowAlt)],
                    [mc('Comisiones Cobradas (Privadas)', rowNorm), mc(tC, { ...rowNorm, numFmt: moneyFmt, font: { bold: true, sz: 14, color: { rgb: '4ADE80' } } }), mc(filasC.length, rowNorm)],
                    [mc('Total General', rowAlt), mc(tG + tC, { ...rowAlt, numFmt: moneyFmt, font: { bold: true, sz: 14, color: { rgb: 'FFFFFF' } } }), mc(filasP.length + filasC.length, rowAlt)],
                ]);
                wsRes['!cols'] = [{ wch: 35 }, { wch: 22 }, { wch: 18 }];
                wsRes['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 2 } }];
                XLSX.utils.book_append_sheet(WB, wsRes, '📊 Resumen');

                XLSX.utils.book_append_sheet(WB, buildSheet(filasP, hdrBlue), '🔵 Por Conciliar');
                XLSX.utils.book_append_sheet(WB, buildSheet(filasC, hdrGreen), '✅ Cobradas');

                // Descargar
                const hoy = new Date().toISOString().slice(0, 10);
                const fileName = `Comisiones_Restringidas_Segumex_${hoy}.xlsx`;
                const buffer = XLSX.write(WB, { bookType: 'xlsx', type: 'array' });
                const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = fileName;
                document.body.appendChild(a); a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url), 2000);

            } catch (err) {
                console.error('Error al exportar Excel:', err);
                alert('Error al generar el Excel: ' + (err.message || 'Error desconocido'));
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span class="material-symbols-outlined text-[18px]">download</span> Exportar Excel';
            }
        }
    </script>
</body>

</html>
