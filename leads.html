<!DOCTYPE html>
<html class="dark" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Pipeline de Ventas - Segumex</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link href="ui.css" rel="stylesheet" />
    <script src="ui.js"></script>
    <script>
        // --- SCRIPT DE SEGURIDAD ---
        (async function () {
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
            }
        })();
        // ---------------------------

        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#135bec", "background-dark": "#101622", "surface-dark": "#111318", "surface-card": "#1c1f27", "text-secondary": "#9da6b9" }, fontFamily: { "display": ["Inter", "sans-serif"] } } } }
    </script>
</head>

<body class="bg-[#f6f6f8] dark:bg-background-dark font-display text-white relative" onload="cargarLeads()">
    <!-- Overlay Mobile -->
    <div id="sidebarOverlay" onclick="toggleMenu()"
        class="fixed inset-0 bg-black/50 z-40 hidden md:hidden glass transition-opacity"></div>

    <div class="flex h-screen w-full overflow-hidden">

        <aside id="sidebar"
            class="fixed inset-y-0 left-0 z-50 w-64 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col border-r border-[#3b4354] bg-[#111318] flex-shrink-0 shadow-2xl md:shadow-none">
        </aside>

        <main class="flex-1 flex flex-col h-full overflow-hidden bg-background-dark relative w-full">
            <!-- Mobile Header / Toggle -->
            <div class="md:hidden p-4 pb-0 flex items-center gap-3">
                <button onclick="toggleMenu()" class="p-2 -ml-2 text-white hover:bg-white/10 rounded-lg">
                    <span class="material-symbols-outlined text-2xl">menu</span>
                </button>
                <span class="font-bold text-lg">Segumex</span>
            </div>

            <div class="px-6 py-4 border-b border-[#3b4354] flex justify-between items-center bg-[#161b22]">
                <h1 class="text-xl font-bold flex items-center gap-2"><span
                        class="material-symbols-outlined text-primary">filter_alt</span> Pipeline de Ventas</h1>
                <button onclick="abrirModalNuevo()"
                    class="bg-primary hover:bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-sm flex items-center gap-2 shadow-lg shadow-primary/30">
                    <span class="material-symbols-outlined">add</span> Nueva Oportunidad
                </button>
            </div>

            <div class="px-6 py-3 border-b border-[#3b4354] flex gap-3 overflow-x-auto items-center">
                <span class="text-xs font-bold text-[#9da6b9] uppercase tracking-wider self-center whitespace-nowrap">Filtros:</span>
                <button data-filtro="semana" onclick="aplicarFiltroLeads('semana')"
                    class="btn-filtro-lead px-3 py-1 rounded-full bg-[#282e39] border border-[#3b4354] text-xs text-white hover:border-primary transition-colors whitespace-nowrap">Esta
                    Semana</button>
                <button data-filtro="vida" onclick="aplicarFiltroLeads('vida')"
                    class="btn-filtro-lead px-3 py-1 rounded-full bg-[#282e39] border border-[#3b4354] text-xs text-white hover:border-primary transition-colors whitespace-nowrap">Seguros
                    de Vida</button>
                <button data-filtro="alta" onclick="aplicarFiltroLeads('alta')"
                    class="btn-filtro-lead px-3 py-1 rounded-full bg-[#282e39] border border-[#3b4354] text-xs text-white hover:border-primary transition-colors whitespace-nowrap">Alta
                    Probabilidad (IA)</button>
            </div>

            <div class="flex-1 overflow-x-auto overflow-y-hidden p-6">
                <div class="flex gap-6 h-full min-w-[1000px]">

                    <div class="flex-1 flex flex-col min-w-[280px]">
                        <div class="flex justify-between items-center mb-4 px-1">
                            <h3 class="font-bold text-white">Nuevo Lead <span id="count-nuevo"
                                    class="ml-2 text-xs bg-[#282e39] px-2 py-0.5 rounded text-[#9da6b9]">0</span></h3>
                        </div>
                        <div id="col-nuevo" class="flex-1 overflow-y-auto pr-2 space-y-3">
                        </div>
                    </div>

                    <div class="flex-1 flex flex-col min-w-[280px]">
                        <div class="flex justify-between items-center mb-4 px-1">
                            <h3 class="font-bold text-white">Calificado <span id="count-calificado"
                                    class="ml-2 text-xs bg-[#282e39] px-2 py-0.5 rounded text-[#9da6b9]">0</span></h3>
                        </div>
                        <div id="col-calificado" class="flex-1 overflow-y-auto pr-2 space-y-3"></div>
                    </div>

                    <div class="flex-1 flex flex-col min-w-[280px]">
                        <div class="flex justify-between items-center mb-4 px-1">
                            <h3 class="font-bold text-white">Cotización <span id="count-cotizacion"
                                    class="ml-2 text-xs bg-[#282e39] px-2 py-0.5 rounded text-[#9da6b9]">0</span></h3>
                        </div>
                        <div id="col-cotizacion" class="flex-1 overflow-y-auto pr-2 space-y-3"></div>
                    </div>

                    <div class="flex-1 flex flex-col min-w-[280px]">
                        <div class="flex justify-between items-center mb-4 px-1">
                            <h3 class="font-bold text-white">Cierre <span id="count-cierre"
                                    class="ml-2 text-xs bg-[#282e39] px-2 py-0.5 rounded text-[#9da6b9]">0</span></h3>
                        </div>
                        <div id="col-cierre" class="flex-1 overflow-y-auto pr-2 space-y-3"></div>
                    </div>

                </div>
            </div>
        </main>

        <div id="modalNuevoLead"
            class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm p-4 animate-fade-in">
            <div class="bg-[#1c1f27] border border-[#3b4354] rounded-xl w-full max-w-xl shadow-2xl flex flex-col max-h-[90vh]">
                <!-- Header -->
                <div class="flex justify-between items-center px-6 pt-6 pb-4 border-b border-[#3b4354] flex-shrink-0">
                    <h2 class="text-lg font-bold text-white">Nuevo Prospecto</h2>
                    <div class="flex items-center gap-3">
                        <!-- Botón escáner IA (siempre visible) -->
                        <label class="cursor-pointer flex items-center gap-1.5 text-xs bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1.5 rounded-lg transition-colors">
                            <span class="material-symbols-outlined" style="font-size:16px">document_scanner</span>
                            <span id="textoEscanear">Escanear póliza / doc.</span>
                            <input type="file" id="archivoEscanear"
                                accept=".pdf,.jpg,.jpeg,.png,image/*"
                                class="hidden" onchange="escanearDocumento(this)">
                        </label>
                        <button onclick="cerrarModalNuevo()" class="text-[#9da6b9] hover:text-white">
                            <span class="material-symbols-outlined">close</span>
                        </button>
                    </div>
                </div>
                <!-- Body scrollable -->
                <div class="overflow-y-auto flex-1 px-6 py-4">
                    <!-- Zona drag & drop -->
                    <div id="dropZoneLead"
                        class="mb-4 border-2 border-dashed border-[#3b4354] rounded-xl p-4 text-center transition-all duration-200 cursor-pointer hover:border-indigo-500/70 hover:bg-indigo-500/5"
                        onclick="document.getElementById('archivoEscanear').click()"
                        ondragover="dragOverZone(event)"
                        ondragleave="dragLeaveZone(event)"
                        ondrop="dropZone(event)">
                        <span class="material-symbols-outlined text-[#9da6b9] block" style="font-size:28px">document_scanner</span>
                        <p class="text-xs text-[#9da6b9] mt-1">Arrastra tu <span class="text-indigo-400 font-semibold">tarjeta de circulación</span> o <span class="text-indigo-400 font-semibold">póliza anterior</span> aquí</p>
                        <p class="text-[10px] text-[#6b7486] mt-0.5">o haz clic para seleccionar &nbsp;·&nbsp; PDF, JPG, PNG</p>
                        <p id="textoDropZone" class="text-[10px] text-indigo-400 mt-1 font-semibold hidden"></p>
                    </div>

                    <form id="formNuevoLead" onsubmit="guardarLead(event)" class="space-y-4">
                        <!-- Nombre -->
                        <div>
                            <label class="block text-xs font-bold text-[#9da6b9] mb-1">Nombre del Prospecto *</label>
                            <input type="text" id="nombreLead" required
                                class="w-full bg-[#111318] border border-[#3b4354] rounded-lg p-2 text-white text-sm">
                        </div>
                        <!-- Producto + CP -->
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-[#9da6b9] mb-1">Producto</label>
                                <select id="productoLead" onchange="toggleAutoFields()"
                                    class="w-full bg-[#111318] border border-[#3b4354] rounded-lg p-2 text-white text-sm">
                                    <option value="Seguro de Vida">Seguro de Vida</option>
                                    <option value="Seguro de Auto">Seguro de Auto</option>
                                    <option value="Seguro de Gastos Médicos">Seguro de Gastos Médicos</option>
                                    <option value="Seguro de Casa/Habitación">Seguro de Casa/Habitación</option>
                                    <option value="Seguro para Negocio">Seguro para Negocio</option>
                                    <option value="Otros">Otros</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-[#9da6b9] mb-1">Código Postal</label>
                                <input type="text" id="cpLead" maxlength="5" inputmode="numeric"
                                    class="w-full bg-[#111318] border border-[#3b4354] rounded-lg p-2 text-white text-sm"
                                    placeholder="00000">
                            </div>
                        </div>
                        <!-- Otros producto -->
                        <div id="seccionOtrosProducto" class="hidden">
                            <label class="block text-xs font-bold text-[#9da6b9] mb-1">Especifica el producto</label>
                            <input type="text" id="otrosProductoLead"
                                class="w-full bg-[#111318] border border-[#3b4354] rounded-lg p-2 text-white text-sm"
                                placeholder="Ej: Seguro de Mascotas">
                        </div>
                        <!-- Valor + Probabilidad -->
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-[#9da6b9] mb-1">Valor Est. (MXN)</label>
                                <input type="number" id="valorLead"
                                    class="w-full bg-[#111318] border border-[#3b4354] rounded-lg p-2 text-white text-sm"
                                    placeholder="0.00">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-[#9da6b9] mb-1">Probabilidad</label>
                                <select id="probLead"
                                    class="w-full bg-[#111318] border border-[#3b4354] rounded-lg p-2 text-white text-sm">
                                    <option value="Baja">Baja</option>
                                    <option value="Media">Media</option>
                                    <option value="Alta">Alta</option>
                                </select>
                            </div>
                        </div>
                        <!-- Etapa + Teléfono -->
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-[#9da6b9] mb-1">Etapa Inicial</label>
                                <select id="etapaLead"
                                    class="w-full bg-[#111318] border border-[#3b4354] rounded-lg p-2 text-white text-sm">
                                    <option value="nuevo">Nuevo Lead</option>
                                    <option value="calificado">Calificado</option>
                                    <option value="cotizacion">Cotización</option>
                                    <option value="cierre">Cierre</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-[#9da6b9] mb-1">Teléfono</label>
                                <input type="tel" id="telLead"
                                    class="w-full bg-[#111318] border border-[#3b4354] rounded-lg p-2 text-white text-sm">
                            </div>
                        </div>
                        <!-- Email -->
                        <div>
                            <label class="block text-xs font-bold text-[#9da6b9] mb-1">Email</label>
                            <input type="email" id="emailLead"
                                class="w-full bg-[#111318] border border-[#3b4354] rounded-lg p-2 text-white text-sm">
                        </div>
                        <!-- Sección Auto (condicional) -->
                        <div id="seccionAuto" class="hidden border border-blue-500/30 bg-blue-500/5 rounded-xl p-4 space-y-3">
                            <div class="flex items-center">
                                <p class="text-xs font-bold text-blue-400 uppercase tracking-wider">Datos del Vehículo</p>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-xs font-bold text-[#9da6b9] mb-1">Marca / Modelo</label>
                                    <input type="text" id="autoModeloLead"
                                        class="w-full bg-[#111318] border border-[#3b4354] rounded-lg p-2 text-white text-sm"
                                        placeholder="Ej: Toyota Corolla">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-[#9da6b9] mb-1">Año</label>
                                    <input type="text" id="autoAnioLead"
                                        class="w-full bg-[#111318] border border-[#3b4354] rounded-lg p-2 text-white text-sm"
                                        placeholder="Ej: 2022">
                                </div>
                            </div>

                                <div>
                                    <label class="block text-xs font-bold text-[#9da6b9] mb-1">Versión / Trim</label>
                                    <input type="text" id="autoVersionLead"
                                        class="w-full bg-[#111318] border border-[#3b4354] rounded-lg p-2 text-white text-sm"
                                        placeholder="Ej: SE CVT">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-[#9da6b9] mb-1">No. de Serie (VIN)</label>
                                    <input type="text" id="autoSerieLead"
                                        class="w-full bg-[#111318] border border-[#3b4354] rounded-lg p-2 text-white text-sm"
                                        placeholder="17 caracteres">
                                </div>
                            </div>

                    </form>
                </div>
                <!-- Footer -->
                <div class="px-6 py-4 border-t border-[#3b4354] flex justify-end gap-2 flex-shrink-0">
                    <button type="button" onclick="cerrarModalNuevo()"

                    <button type="submit" form="formNuevoLead"
                        class="bg-primary hover:bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-lg shadow-primary/20">Crear Lead</button>
                </div>
            </div>
        </div>
    </div>

    <script src="menu.js"></script>

    <script>
        let _leadsData = [];
        let _filtroActivoLeads = null;

        async function cargarLeads() {
            const { data: leads, error } = await window.supabaseClient.from('leads').select('*');
            if (error) return;
            _leadsData = (leads || []).filter(l => l.etapa !== 'ganada');
            renderizarLeads(_leadsData);
        }

        function renderizarLeads(leads) {
            ['nuevo', 'calificado', 'cotizacion', 'cierre'].forEach(c => {
                document.getElementById(`col-${c}`).innerHTML = '';
                document.getElementById(`count-${c}`).innerText = '0';
            });

            const contadores = { nuevo: 0, calificado: 0, cotizacion: 0, cierre: 0 };

            leads.forEach(l => {
                const col = document.getElementById(`col-${l.etapa}`);
                if (col) {
                    contadores[l.etapa]++;

                    let tagColor = "bg-blue-500/10 text-blue-400 border-blue-500/20";
                    if (l.producto === 'Seguro de Vida') tagColor = "bg-purple-500/10 text-purple-400 border-purple-500/20";
                    if (l.producto === 'Seguro de Auto' || l.producto === 'Autos' || l.producto === 'Flotilla') tagColor = "bg-orange-500/10 text-orange-400 border-orange-500/20";
                    if (l.producto === 'Seguro de Casa/Habitación') tagColor = "bg-green-500/10 text-green-400 border-green-500/20";
                    if (l.producto === 'Seguro para Negocio') tagColor = "bg-yellow-500/10 text-yellow-400 border-yellow-500/20";

                    let probBadge = "";
                    if (l.prob === "Alta") probBadge = `<span class="text-[10px] font-bold px-2 py-0.5 rounded bg-green-500/20 text-green-400 border border-green-500/30 flex items-center gap-1"><span class="material-symbols-outlined text-[10px]">auto_awesome</span> Alta Prob.</span>`;

                    const card = `
                    <div onclick="window.location.href='detalle_lead.html?id=${l.id}'" class="bg-surface-card border border-[#3b4354] rounded-xl p-4 cursor-pointer hover:border-primary transition-all group shadow-sm hover:shadow-md hover:shadow-black/40 relative">
                        <div class="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity z-10">
                            <button onclick="procesarGanada(event, ${l.id})" class="p-1 bg-green-500/20 text-green-500 hover:bg-green-500 hover:text-white rounded shadow-lg backdrop-blur-sm" title="Venta Ganada"><span class="material-symbols-outlined text-[18px]">check_circle</span></button>
                            <button onclick="borrarLead(event, ${l.id})" class="p-1 bg-red-500/20 text-red-500 hover:bg-red-500 hover:text-white rounded shadow-lg backdrop-blur-sm"><span class="material-symbols-outlined text-[18px]">delete</span></button>
                        </div>
                        <div class="flex justify-between items-start mb-2 pr-6">
                            <div class="flex items-center gap-2">
                                <div class="size-8 rounded-full bg-gradient-to-br from-gray-700 to-gray-900 flex items-center justify-center font-bold text-xs border border-white/10">${l.nombre.charAt(0)}</div>
                                <h4 class="font-bold text-sm text-white group-hover:text-primary transition-colors truncate w-32">${l.nombre}</h4>
                            </div>
                        </div>
                        <span class="text-[#9da6b9] text-[10px] block mb-2">${l.fecha}</span>
                        <div class="flex items-center gap-2 mb-3 flex-wrap">
                            <span class="px-2 py-0.5 rounded text-[10px] font-bold border ${tagColor}">${l.producto}</span>
                            ${probBadge}
                        </div>
                        <div class="flex justify-between items-end mt-2 pt-2 border-t border-[#3b4354]">
                            <div>
                                <p class="text-[#9da6b9] text-[10px] uppercase">Valor Est.</p>
                                <p class="text-white font-bold text-sm">$${new Intl.NumberFormat('es-MX').format(l.valor)}</p>
                            </div>
                            <div class="opacity-0 group-hover:opacity-100 transition-opacity">
                                <span class="material-symbols-outlined text-[#9da6b9] hover:text-white text-sm">arrow_forward</span>
                            </div>
                        </div>
                    </div>
                `;
                    col.innerHTML += card;
                }
            });

            Object.keys(contadores).forEach(key => {
                document.getElementById(`count-${key}`).innerText = contadores[key];
            });
        }

        function aplicarFiltroLeads(tipo) {
            if (_filtroActivoLeads === tipo) {
                _filtroActivoLeads = null;
            } else {
                _filtroActivoLeads = tipo;
            }

            document.querySelectorAll('.btn-filtro-lead').forEach(b => {
                const activo = b.dataset.filtro === _filtroActivoLeads;
                b.className = activo
                    ? 'btn-filtro-lead px-3 py-1 rounded-full border text-xs font-bold bg-primary/20 border-primary/50 text-primary transition-colors whitespace-nowrap'
                    : 'btn-filtro-lead px-3 py-1 rounded-full bg-[#282e39] border border-[#3b4354] text-xs text-white hover:border-primary transition-colors whitespace-nowrap';
            });

            let filtrado = [..._leadsData];

            if (_filtroActivoLeads === 'semana') {
                const hace7dias = new Date();
                hace7dias.setDate(hace7dias.getDate() - 7);
                filtrado = filtrado.filter(l => l.created_at && new Date(l.created_at) >= hace7dias);
            } else if (_filtroActivoLeads === 'vida') {
                filtrado = filtrado.filter(l => l.producto === 'Seguro de Vida');
            } else if (_filtroActivoLeads === 'alta') {
                filtrado = filtrado.filter(l => l.prob === 'Alta');
            }

            renderizarLeads(filtrado);
        }

        async function procesarGanada(e, idLead) {
            e.stopPropagation();
            if (!confirm("¿Confirmar Venta Ganada? Esto creará el Cliente y la Póliza automáticamente.")) return;

            // Obtener Sesión para asignar Agente
            const sesion = JSON.parse(localStorage.getItem('segumex_sesion')) || { nombre: 'Agente Segumex' };
            const agenteAsignado = sesion.nombre || 'Agente Segumex';

            const { data: lead } = await window.supabaseClient.from('leads').select('*').eq('id', idLead).single();

            if (lead) {
                const btn = e.currentTarget;
                window.SegumexUI.setLoading(btn, "...");

                // 1. Crear Cliente (ID Autogenerado por DB)
                const nuevoCliente = {
                    nombre: lead.nombre, // Supabase ID is serial/uuid
                    tipo: "Persona",
                    estatus: "Activo",
                    email: lead.email || "pendiente@email.com",
                    telefono: lead.telefono || "",
                    nacimiento: null,
                    agente: agenteAsignado, // IMPORTANTE: Asignar al dueño
                    restringida: false
                };

                // Insertar Cliente y RETORNAR el objeto creado para obtener su ID real
                const { data: clienteCreado, error: errCli } = await window.supabaseClient
                    .from('clientes')
                    .insert([nuevoCliente])
                    .select()
                    .single();

                if (errCli) {
                    alert("Error creando cliente: " + errCli.message);
                    window.SegumexUI.resetLoading(btn);
                    return;
                }

                // 2. Crear Póliza vinculada al Cliente Real
                const nuevaPoliza = {
                    cliente_id: clienteCreado.id, // ID Real de la DB
                    ramo: lead.producto,
                    aseguradora: "Por Asignar",
                    no_poliza: "PEND-" + Math.floor(Math.random() * 10000), // Temporal hasta que User edite
                    vence: new Date(new Date().setFullYear(new Date().getFullYear() + 1)).toISOString().split('T')[0],
                    estado: "vigente",
                    prima: lead.valor,
                    agente: agenteAsignado, // IMPORTANTE: Asignar al dueño
                    restringida: false,
                    icono: 'pending',
                    estiloIcono: 'text-gray-400 bg-gray-500/10'
                };

                const { error: errPol } = await window.supabaseClient.from('polizas').insert([nuevaPoliza]);

                if (errPol) {
                    alert("Cliente creado, pero error en póliza: " + errPol.message);
                } else {
                    // Actualizar Lead a Ganada
                    await window.supabaseClient.from('leads').update({ etapa: 'ganada' }).eq('id', idLead);
                    cargarLeads();
                    alert(`¡Venta procesada con éxito!\nCliente: ${clienteCreado.nombre}\nAsignado a: ${agenteAsignado}`);
                }
                window.SegumexUI.resetLoading(btn);
            }
        }

        function abrirModalNuevo() {
            document.getElementById('modalNuevoLead').classList.remove('hidden');
        }

        function cerrarModalNuevo() {
            document.getElementById('modalNuevoLead').classList.add('hidden');
            document.getElementById('nombreLead').value = '';
            document.getElementById('valorLead').value = '';
            document.getElementById('telLead').value = '';
            document.getElementById('emailLead').value = '';
            document.getElementById('cpLead').value = '';
            document.getElementById('otrosProductoLead').value = '';
            document.getElementById('autoModeloLead').value = '';
            document.getElementById('autoAnioLead').value = '';
            document.getElementById('autoVersionLead').value = '';
            document.getElementById('autoSerieLead').value = '';
            document.getElementById('archivoEscanear').value = '';
            document.getElementById('textoEscanear').textContent = 'Escanear póliza / doc.';
            document.getElementById('textoDropZone').classList.add('hidden');
            document.getElementById('textoDropZone').textContent = '';
            document.getElementById('seccionAuto').classList.add('hidden');
            document.getElementById('seccionOtrosProducto').classList.add('hidden');
            document.getElementById('productoLead').value = 'Seguro de Vida';
        }

        function toggleAutoFields() {
            const producto = document.getElementById('productoLead').value;
            document.getElementById('seccionAuto').classList.toggle('hidden', producto !== 'Seguro de Auto');
            document.getElementById('seccionOtrosProducto').classList.toggle('hidden', producto !== 'Otros');
        }

        async function escanearDocumento(input) {
            if (!input.files || !input.files[0]) return;
            const archivo = input.files[0];
            const textoBtn = document.getElementById('textoEscanear');
            textoBtn.textContent = 'Analizando...';

            try {
                // Leer como base64
                const base64 = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.onerror = reject;
                    reader.readAsDataURL(archivo);
                });

                const mimeType = archivo.type || 'application/pdf';

                const { data: { session } } = await window.supabaseClient.auth.getSession();
                const token = session?.access_token;

                const res = await fetch('https://mmhdpbygdvdyujiktvqa.supabase.co/functions/v1/scan-policy-pdf', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...(token ? { 'Authorization': `Bearer ${token}` } : {})
                    },
                    body: JSON.stringify({ pdf_base64: base64, mime_type: mimeType, filename: archivo.name })
                });

                const resultado = await res.json();
                if (!resultado.success) throw new Error(resultado.error || 'Error al escanear');

                const d = resultado.data;
                const v = d.vehiculo || {};
                const c = d.cliente || {};

                // Prefill campos del vehículo
                if (v.marca || v.modelo) {
                    const marcaModelo = [v.marca, v.modelo].filter(Boolean).join(' ');
                    document.getElementById('autoModeloLead').value = marcaModelo;
                }
                if (v.anio) document.getElementById('autoAnioLead').value = v.anio;
                if (v.version) document.getElementById('autoVersionLead').value = v.version;
                if (v.serie) document.getElementById('autoSerieLead').value = v.serie;

                // Prefill datos del cliente si están vacíos
                if (c.nombre && !document.getElementById('nombreLead').value) {
                    document.getElementById('nombreLead').value = [c.nombre, c.apellido].filter(Boolean).join(' ');
                }
                if (c.telefono && !document.getElementById('telLead').value) {
                    document.getElementById('telLead').value = c.telefono;
                }
                if (c.cp && !document.getElementById('cpLead').value) {
                    document.getElementById('cpLead').value = c.cp;
                }

                textoBtn.textContent = '✓ Datos cargados';
                document.getElementById('textoDropZone').textContent = '✓ Datos extraídos correctamente';
                document.getElementById('textoDropZone').classList.remove('hidden');
            } catch (err) {
                console.error('Error escanear:', err);
                textoBtn.textContent = 'Escanear póliza / doc.';
                document.getElementById('textoDropZone').classList.add('hidden');
                alert('No se pudo escanear el documento:\n' + err.message);
            }
        }

        function dragOverZone(e) {
            e.preventDefault();
            const zone = document.getElementById('dropZoneLead');
            zone.classList.add('border-indigo-500', 'bg-indigo-500/10');
            zone.classList.remove('border-[#3b4354]');
        }

        function dragLeaveZone(e) {
            const zone = document.getElementById('dropZoneLead');
            zone.classList.remove('border-indigo-500', 'bg-indigo-500/10');
            zone.classList.add('border-[#3b4354]');
        }

        function dropZone(e) {
            e.preventDefault();
            dragLeaveZone(e);
            const file = e.dataTransfer?.files?.[0];
            if (!file) return;
            // Simular que el file input recibió el archivo
            const dt = new DataTransfer();
            dt.items.add(file);
            const input = document.getElementById('archivoEscanear');
            input.files = dt.files;
            escanearDocumento(input);
        }

        async function guardarLead(e) {
            e.preventDefault();
            const btnSubmit = e.target.querySelector('button[type="submit"]'); // Use querySelector on form
            window.SegumexUI.setLoading(btnSubmit, "Guardando...");

            const productoBase = document.getElementById('productoLead').value;
            const productoFinal = productoBase === 'Otros'
                ? (document.getElementById('otrosProductoLead').value.trim() || 'Otros')
                : productoBase;

            const nuevo = {
                nombre: document.getElementById('nombreLead').value,
                producto: productoFinal,
                valor: parseFloat(document.getElementById('valorLead').value) || 0,
                prob: document.getElementById('probLead').value,
                etapa: document.getElementById('etapaLead').value,
                telefono: document.getElementById('telLead').value,
                email: document.getElementById('emailLead').value,
                fecha: new Date().toLocaleDateString('es-MX', { day: 'numeric', month: 'short' }),
                codigo_postal: document.getElementById('cpLead').value.trim() || null,
                auto_modelo: document.getElementById('autoModeloLead').value.trim() || null,
                auto_anio: document.getElementById('autoAnioLead').value.trim() || null,
                auto_version: document.getElementById('autoVersionLead').value.trim() || null,
                auto_serie: document.getElementById('autoSerieLead').value.trim() || null,
            };

            const { error } = await window.supabaseClient.from('leads').insert([nuevo]);

            window.SegumexUI.resetLoading(btnSubmit);

            if (!error) {
                cerrarModalNuevo();
                cargarLeads();
            } else {
                alert("Error al guardar lead:\n" + error.message);
            }
        }

        async function borrarLead(e, id) {
            e.stopPropagation();
            if (confirm("¿Eliminar esta oportunidad?")) {
                const { error } = await window.supabaseClient.from('leads').delete().eq('id', id);
                if (!error) cargarLeads();
            }
        }
    </script>
</body>
